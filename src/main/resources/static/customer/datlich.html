<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đặt lịch khám - PHÒNG KHÁM PHENIKAAMEC</title>
    <link rel="stylesheet" href="/css/kieu.css" />
  </head>
  <body class="customer-layout">
    <header class="customer-header">
      <a href="/customer/trangchu.html" class="brand"><img src="/images/logo.png" alt="PHÒNG KHÁM PHENIKAAMEC" style="height:36px;vertical-align:middle;margin-right:8px">PHÒNG KHÁM PHENIKAAMEC</a>
      <nav>
        <a href="/customer/trangchu.html">Trang chủ</a>
        <a href="/customer/khoa.html">Chuyên khoa</a>
        <a href="/customer/bacsi.html">Bác sĩ</a>
        <a href="/customer/datlich.html">Đặt lịch</a>
        <a href="/customer/lichcuatoi.html">Lịch khám</a>
        <a href="/customer/hoso.html">Thông tin cá nhân</a>
        <span class="text-muted" id="user-name"></span>
        <button type="button" class="btn btn-sm" onclick="logout()">Đăng xuất</button>
      </nav>
    </header>
    <div class="customer-content profile-page">
      <div class="profile-layout">
        <aside class="profile-sidebar">
          <nav class="profile-menu">
            <a href="/customer/hoso.html">Thông tin cá nhân</a>
            <a href="/customer/lichcuatoi.html">Lịch khám</a>
            <a href="#">Đánh giá</a>
            <a href="#" onclick="logout(); return false;">Đăng xuất</a>
          </nav>
        </aside>
        <main class="profile-main">
          <h1 class="page-title">Đặt lịch khám</h1>
          <div class="booking-form-wrap">
            <form id="booking-form">
          <div class="card form-section">
            <div class="card-header">Thông tin cá nhân</div>
            <div class="card-body">
              <div class="form-row">
                <div class="form-group">
                  <label>Họ tên *</label>
                  <input
                    type="text"
                    id="fullname"
                    placeholder="Họ và tên"
                    required
                  />
                </div>
                <div class="form-group">
                  <label>Tuổi</label>
                  <input
                    type="number"
                    id="age"
                    min="1"
                    max="120"
                    placeholder="25"
                  />
                </div>
                <div class="form-group">
                  <label>Giới tính</label>
                  <select id="gender">
                    <option value="">-- Chọn --</option>
                    <option value="male">Nam</option>
                    <option value="female">Nữ</option>
                    <option value="other">Khác</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>CCCD/CMND</label>
                  <input type="text" id="cccd" placeholder="Số CCCD" />
                </div>
                <div class="form-group">
                  <label>Số điện thoại *</label>
                  <input
                    type="tel"
                    id="phone"
                    placeholder="0901234567"
                    required
                  />
                </div>
                <div class="form-group">
                  <label>Địa chỉ</label>
                  <input type="text" id="address" placeholder="Địa chỉ" />
                </div>
              </div>
            </div>
          </div>
          <div class="card form-section">
            <div class="card-header">Thông tin khám bệnh</div>
            <div class="card-body">
              <div class="form-row">
                <div class="form-group">
                  <label>Chuyên khoa *</label>
                  <select id="department" required>
                    <option value="">-- Chọn chuyên khoa --</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Bác sĩ *</label>
                  <select id="doctor" required>
                    <option value="">-- Chọn bác sĩ --</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Dịch vụ khám *</label>
                  <select id="service" required>
                    <option value="">-- Chọn dịch vụ --</option>
                    <option value="kham-tong-quat">Khám tổng quát</option>
                    <option value="xet-nghiem">Xét nghiệm</option>
                    <option value="tam-soat">Tầm soát</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Ngày khám *</label>
                  <input type="date" id="date" required />
                </div>
                <div class="form-group">
                  <label>Khung giờ *</label>
                  <select id="time" required>
                    <option value="">-- Chọn giờ --</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label>Triệu chứng cơ bản</label>
                <textarea
                  id="symptoms"
                  rows="3"
                  placeholder="Mô tả ngắn triệu chứng (không bắt buộc)"
                ></textarea>
              </div>
            </div>
          </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  Gửi yêu cầu đặt lịch
                </button>
                <button
                  type="button"
                  class="btn btn-outline"
                  onclick="document.getElementById('booking-form').reset()"
                >
                  Hủy
                </button>
              </div>
            </form>
          </div>
        </main>
      </div>
    </div>
    <script src="/js/xacthuc.js"></script>
    <script>
      (function () {
        var user = getCurrentUser();
        if (!user) {
          window.location.href = "/admin/dangnhap.html";
          return;
        }
        if (normalizeRole(user.role) !== "customer") {
          redirectByRole(user.role);
          return;
        }
        var account = user ? (user.username || user.email || "").trim() : "";

        var specialtySelect = document.getElementById("department");
        var doctorSelect = document.getElementById("doctor");
        var dateInput = document.getElementById("date");
        var timeSelect = document.getElementById("time");

        if (user) {
          document.getElementById("user-name").textContent = user.name || user.email;
          document.getElementById("fullname").value = user.name || "";
          document.getElementById("phone").value = user.phone || "";
        }

        var today = new Date().toISOString().slice(0, 10);
        dateInput.setAttribute("min", today);

        function resetDoctorOptions() {
          doctorSelect.innerHTML = '<option value="">-- Chọn bác sĩ --</option>';
        }

        function resetSlotOptions() {
          timeSelect.innerHTML = '<option value="">-- Chọn giờ --</option>';
        }

        function applyProfileToForm(profile) {
          if (!profile) return;
          document.getElementById("fullname").value = profile.fullname || (user ? user.name : "") || "";
          document.getElementById("age").value = profile.age || "";
          document.getElementById("gender").value = profile.gender || "";
          document.getElementById("cccd").value = profile.cccd || "";
          document.getElementById("phone").value = profile.phone || (user ? user.phone : "") || "";
          document.getElementById("address").value = profile.address || "";

          if (!user) return;
          user.patientId = profile.id || user.patientId;
          if (profile.fullname) user.name = profile.fullname;
          if (profile.phone) user.phone = profile.phone;
          setCurrentUser(user);
          document.getElementById("user-name").textContent = user.name || user.email;
        }

        async function loadPatientProfileByAccount() {
          if (!account) return null;
          var profile = await apiJson("/api/patients/by-account?account=" + encodeURIComponent(account));
          if (profile && profile.id) {
            applyProfileToForm(profile);
            return profile;
          }
          return null;
        }

        async function loadSpecialties() {
          var data = await apiJson("/api/patient/specialties");
          specialtySelect.innerHTML = '<option value="">-- Chọn chuyên khoa --</option>';
          data.forEach(function (item) {
            var option = document.createElement("option");
            option.value = item.id;
            option.textContent = item.ten;
            specialtySelect.appendChild(option);
          });
        }

        async function loadDoctors() {
          resetDoctorOptions();
          resetSlotOptions();
          var specialtyId = specialtySelect.value;
          var url = "/api/patient/doctors" + (specialtyId ? ("?specialtyId=" + encodeURIComponent(specialtyId)) : "");
          var data = await apiJson(url);
          data.forEach(function (item) {
            var option = document.createElement("option");
            option.value = item.id;
            option.textContent = item.hoTen + (item.chucDanh ? (" - " + item.chucDanh) : "");
            doctorSelect.appendChild(option);
          });
        }

        async function loadSlots() {
          resetSlotOptions();
          if (!doctorSelect.value || !dateInput.value) return;
          var url = "/api/patient/doctors/" + encodeURIComponent(doctorSelect.value)
              + "/available-slots?date=" + encodeURIComponent(dateInput.value);
          var data = await apiJson(url);
          if (!data || !data.length) {
            var empty = document.createElement("option");
            empty.value = "";
            empty.textContent = "Khong co khung gio trong";
            timeSelect.appendChild(empty);
            return;
          }
          data.forEach(function (item) {
            var option = document.createElement("option");
            option.value = item.id;
            option.textContent = item.gioBatDau + " - " + item.gioKetThuc;
            timeSelect.appendChild(option);
          });
        }

        async function ensurePatientProfile() {
          if (!user) {
            throw new Error("Vui long dang nhap de dat lich.");
          }
          if (!user.patientId) {
            await loadPatientProfileByAccount();
          }
          if (user.patientId) return user.patientId;

          var body = {
            fullname: document.getElementById("fullname").value.trim(),
            age: document.getElementById("age").value ? Number(document.getElementById("age").value) : null,
            gender: document.getElementById("gender").value || null,
            cccd: document.getElementById("cccd").value.trim() || null,
            phone: document.getElementById("phone").value.trim() || null,
            address: document.getElementById("address").value.trim() || null,
          };

          var url = "/api/patients";
          if (account) {
            url = "/api/patients/upsert-by-account?account=" + encodeURIComponent(account);
          }

          var created = await apiJson(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });

          user.patientId = created.id;
          user.name = body.fullname || user.name;
          user.phone = body.phone || user.phone;
          setCurrentUser(user);
          return created.id;
        }

        specialtySelect.addEventListener("change", function () {
          loadDoctors().catch(function (err) {
            alert(err.message || "Khong the tai danh sach bac si");
          });
        });

        doctorSelect.addEventListener("change", function () {
          loadSlots().catch(function (err) {
            alert(err.message || "Khong the tai khung gio");
          });
        });

        dateInput.addEventListener("change", function () {
          loadSlots().catch(function (err) {
            alert(err.message || "Khong the tai khung gio");
          });
        });

        document.getElementById("booking-form").addEventListener("submit", async function (e) {
          e.preventDefault();
          try {
            var patientId = await ensurePatientProfile();
            if (!timeSelect.value) {
              alert("Vui long chon khung gio hop le trong danh sach.");
              return;
            }
            var res = await apiJson("/api/patient/appointments", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                patientId: String(patientId),
                workScheduleId: String(timeSelect.value),
                symptom: document.getElementById("symptoms").value.trim(),
              }),
            });

            if (!res.success) {
              alert(res.message || "Dat lich that bai");
              return;
            }

            alert("Dat lich thanh cong");
            window.location.href = "/customer/lichcuatoi.html";
          } catch (err) {
            alert(err.message || "Dat lich that bai");
          }
        });

        loadSpecialties().catch(function (err) {
          alert(err.message || "Khong the tai danh sach chuyen khoa");
        });

        loadPatientProfileByAccount().catch(function () {
          // Khong co ho so tren DB thi tiep tuc dung localStorage, se tao khi dat lich.
        });
      })();
    </script>
  </body>
</html>
