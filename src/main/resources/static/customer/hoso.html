<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - Khách hàng</title>
    <link rel="stylesheet" href="/css/kieu.css">
</head>
<body class="customer-layout">
    <header class="customer-header">
      <a href="/customer/trangkhach.html" class="brand">PHÒNG KHÁM PHENIKAA UNI</a>
      <nav>
        <a href="/trangchu.html">Trang chủ</a>
        <a href="/customer/khoa.html">Chuyên khoa</a>
        <a href="/customer/bacsi.html">Bác sĩ</a>
        <a href="/customer/datlich.html">Đặt lịch</a>
        <a href="/customer/lichcuatoi.html">Lịch khám</a>
        <a href="/customer/hoso.html">Thông tin cá nhân</a>
        <span class="text-muted" id="user-name"></span>
        <button type="button" class="btn btn-sm" onclick="logout()">Đăng xuất</button>
      </nav>
    </header>
    <div class="customer-content profile-page">
        <div class="profile-layout">
            <aside class="profile-sidebar">
                <nav class="profile-menu">
                    <a href="/customer/hoso.html" class="active">Thông tin cá nhân</a>
                    <a href="/customer/lichcuatoi.html">Lịch khám</a>
                    <a href="#">Đánh giá</a>
                    <a href="#" onclick="logout(); return false;">Đăng xuất</a>
                </nav>
            </aside>
            <main class="profile-main">
                <h1 class="page-title">Thông tin cá nhân</h1>
                <div class="card">
                    <div class="card-header">Chỉnh sửa thông tin</div>
                    <div class="card-body">
                        <form id="profile-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Họ tên *</label>
                                    <input type="text" id="fullname" placeholder="Họ và tên" required>
                                </div>
                                <div class="form-group">
                                    <label>Tuổi</label>
                                    <input type="number" id="age" placeholder="25" min="1" max="120">
                                </div>
                                <div class="form-group">
                                    <label>Giới tính</label>
                                    <select id="gender">
                                        <option value="">-- Chọn --</option>
                                        <option value="male">Nam</option>
                                        <option value="female">Nữ</option>
                                        <option value="other">Khác</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>CCCD/CMND</label>
                                    <input type="text" id="cccd" placeholder="Số CCCD">
                                </div>
                                <div class="form-group">
                                    <label>Số điện thoại *</label>
                                    <input type="tel" id="phone" placeholder="0901234567" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Địa chỉ</label>
                                <input type="text" id="address" placeholder="Địa chỉ liên hệ">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="email" readonly style="background: #f1f5f9;">
                            </div>
                            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                        </form>
                    </div>
                </div>
                <h2 class="section-title">Lịch sử đặt lịch khám</h2>
                <div class="card">
                    <div class="card-body">
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Mã lịch</th>
                                        <th>Chuyên khoa</th>
                                        <th>Bác sĩ</th>
                                        <th>Ngày giờ</th>
                                        <th>Trạng thái</th>
                                    </tr>
                                </thead>
                                <tbody id="appointments-tbody">
                                    <tr>
                                        <td colspan="5" style="text-align: center; color: #888;">Đang tải...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="/js/xacthuc.js"></script>
    <script>
        (function() {
            var user = requireAuth(['patient']);
            var account = (user && (user.username || user.email) ? (user.username || user.email) : '').trim();

            function formPayload() {
                return {
                    fullname: document.getElementById('fullname').value.trim(),
                    age: document.getElementById('age').value ? Number(document.getElementById('age').value) : null,
                    gender: document.getElementById('gender').value || null,
                    cccd: document.getElementById('cccd').value.trim() || null,
                    phone: document.getElementById('phone').value.trim() || null,
                    address: document.getElementById('address').value.trim() || null,
                    taiKhoan: account || null,
                };
            }

            function applyProfile(profile) {
                if (!profile) return;
                if (profile.id) user.patientId = profile.id;
                if (profile.fullname) user.name = profile.fullname;
                if (profile.phone) user.phone = profile.phone;
                setCurrentUser(user);

                document.getElementById('fullname').value = profile.fullname || user.name || '';
                document.getElementById('age').value = profile.age || '';
                document.getElementById('gender').value = profile.gender || '';
                document.getElementById('cccd').value = profile.cccd || '';
                document.getElementById('phone').value = profile.phone || user.phone || '';
                document.getElementById('address').value = profile.address || '';
                document.getElementById('user-name').textContent = user.name || user.email;
            }

            async function loadProfileFromDb() {
                if (!account) return;
                var profile = await apiJson('/api/patients/by-account?account=' + encodeURIComponent(account));
                if (profile && profile.id) {
                    applyProfile(profile);
                }
            }

            if (user) {
                document.getElementById('user-name').textContent = user.name || user.email;
                document.getElementById('email').value = user.email || '';
                document.getElementById('fullname').value = user.name || '';
                if (user.phone) document.getElementById('phone').value = user.phone;
            }
            document.getElementById('profile-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                if (!user) return;

                try {
                    var payload = formPayload();
                    var saved;

                    if (user.patientId) {
                        saved = await apiJson('/api/patients/' + encodeURIComponent(user.patientId), {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                        });
                    } else {
                        var upsertUrl = account
                            ? '/api/patients/upsert-by-account?account=' + encodeURIComponent(account)
                            : '/api/patients';
                        saved = await apiJson(upsertUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload),
                        });
                    }

                    applyProfile(saved);
                    alert('Da luu thong tin co ban vao he thong.');
                } catch (err) {
                    alert(err.message || 'Luu ho so that bai');
                }
            });

            loadProfileFromDb().catch(function() {
                // Khong co profile trong DB thi van hien localStorage va tao khi luu.
            });

            // Load appointments (lịch sử đặt khám)
            async function loadAppointments() {
                if (!user || !user.patientId) return;
                try {
                    var appointments = await apiJson('/api/patient/' + encodeURIComponent(user.patientId) + '/appointments');
                    var tbody = document.getElementById('appointments-tbody');
                    
                    if (!appointments || appointments.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #888;">Chưa có lịch khám nào</td></tr>';
                        return;
                    }

                    tbody.innerHTML = appointments.map(function(appt) {
                        var ngayGio = '';
                        if (appt.ngayKham && appt.gioKham) {
                            var day = appt.ngayKham;
                            var time = appt.gioKham;
                            // Format: DD/MM/YYYY HH:mm
                            ngayGio = day + ' ' + time;
                        }

                        var bacSiName = appt.bacSi && appt.bacSi.hoTen ? appt.bacSi.hoTen : 'N/A';
                        var chuyenKhoaName = appt.chuyenKhoa && appt.chuyenKhoa.tenChuyenKhoa ? appt.chuyenKhoa.tenChuyenKhoa : 'N/A';
                        
                        var statusBadge = '';
                        var status = appt.trangThai;
                        if (status === 'CHO_XAC_NHAN') {
                            statusBadge = '<span class="badge badge-warning">Chờ xác nhận</span>';
                        } else if (status === 'DA_XAC_NHAN') {
                            statusBadge = '<span class="badge badge-info">Đã xác nhận</span>';
                        } else if (status === 'DA_KHAM') {
                            statusBadge = '<span class="badge badge-success">Đã khám</span>';
                        } else if (status === 'HUY') {
                            statusBadge = '<span class="badge badge-danger">Đã hủy</span>';
                        } else {
                            statusBadge = '<span class="badge">' + status + '</span>';
                        }

                        return '<tr>'
                            + '<td>#LH' + appt.id + '</td>'
                            + '<td>' + chuyenKhoaName + '</td>'
                            + '<td>BS. ' + bacSiName + '</td>'
                            + '<td>' + ngayGio + '</td>'
                            + '<td>' + statusBadge + '</td>'
                            + '</tr>';
                    }).join('');
                } catch (err) {
                    var tbody = document.getElementById('appointments-tbody');
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #888;">Không thể tải lịch khám</td></tr>';
                    console.error('Error loading appointments:', err);
                }
            }

            // Load appointments sau khi load profile
            if (user && user.patientId) {
                loadAppointments();
            } else {
                loadProfileFromDb().then(function() {
                    loadAppointments();
                }).catch(function() {
                    // Handle error
                });
            }
        })();
    </script>
</body>
</html>
