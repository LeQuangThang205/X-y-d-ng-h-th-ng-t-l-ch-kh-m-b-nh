<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Đặt lịch khám online</title>
    <link rel="stylesheet" href="/css/kieu.css">
</head>
<body class="login-page">
    <header class="public-header public-header-mini">
        <a href="/customer/trangchu.html" class="brand">Đặt lịch khám online</a>
        <nav class="header-nav">
            <a href="/dangnhap.html" class="btn btn-outline">Đăng nhập</a>
        </nav>
    </header>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <span class="logo-icon">🏥</span>
                <h1>Đăng ký tài khoản</h1>
                <p>Tạo tài khoản khách hàng để đặt lịch khám online</p>
            </div>
            <form id="register-form" class="login-form">
                <div class="form-group">
                    <label for="fullname">Họ và tên *</label>
                    <input type="text" id="fullname" placeholder="Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại *</label>
                    <input type="tel" id="phone" placeholder="0901234567" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu *</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm">Xác nhận mật khẩu *</label>
                    <input type="password" id="confirm" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Đăng ký</button>
            </form>
            <p class="login-hint">Đã có tài khoản? <a href="/dangnhap.html">Đăng nhập</a></p>
        </div>
    </div>

    <script src="/js/xacthuc.js"></script>
    <script>
        (function() {
            var user = getCurrentUser();
            if (user) redirectByRole(user.role);

            document.getElementById('register-form').addEventListener('submit', async function(e) {
                e.preventDefault();
                var password = document.getElementById('password').value;
                var confirm = document.getElementById('confirm').value;
                if (password !== confirm) {
                    alert('Mat khau va xac nhan mat khau khong khop.');
                    return;
                }

                var fullname = document.getElementById('fullname').value.trim();
                var email = document.getElementById('email').value.trim();
                var phone = document.getElementById('phone').value.trim();

                try {
                    var reg = await authRegister(email, password, 'patient');
                    if (!reg.success) {
                        alert(reg.message || 'Dang ky that bai');
                        return;
                    }
                    var login = await authLogin(email, password);
                    if (!login.success) {
                        alert(login.message || 'Dang nhap that bai');
                        return;
                    }
                    setCurrentUser({ name: fullname, email: email, phone: phone, role: login.role, username: login.user });
                    alert('Dang ky thanh cong!');
                    redirectByRole(login.role);
                } catch (err) {
                    alert(err.message || 'Dang ky that bai');
                }
            });
        })();
    </script>
</body>
</html>
