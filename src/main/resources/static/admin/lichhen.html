<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đặt lịch - TT Care+</title>
    <link rel="stylesheet" href="/css/kieu.css">
</head>
<body class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header"><span class="logo">Admin</span></div>
        <nav class="sidebar-nav">
            <a href="/admin/trangquantri.html"><span class="icon">📊</span> Bảng điều khiển</a>
            <a href="/admin/khachhang.html"><span class="icon">👥</span> Quản lý khách hàng</a>
            <a href="/admin/taikhoan.html"><span class="icon">🔐</span> Quản lý tài khoản</a>
            <a href="/admin/lichhen.html" class="active"><span class="icon">📅</span> Quản lý đặt lịch</a>
            <a href="/admin/bacsi.html"><span class="icon">🩺</span> Quản lý bác sĩ</a>
            <a href="/admin/khoa.html"><span class="icon">🏷️</span> Quản lý chuyên khoa</a>
            <a href="/admin/phongkham.html">Quản lý phòng khám</a>
            <a href="/admin/dichvu.html"><span class="icon">📋</span> Quản lý dịch vụ</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar">
            <h2>Quản lý đặt lịch</h2>
            <div class="user-menu">
                <span id="user-name"></span>
                <button type="button" class="btn" onclick="logout()">Đăng xuất</button>
            </div>
        </header>
        <div class="content">
            <h1 class="page-title">Danh sách lịch khám</h1>
            <div class="card">
                <div class="card-body">
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Khách hàng</th>
                                    <th>Bác sĩ</th>
                                    <th>Chuyên khoa</th>
                                    <th>Thời gian</th>
                                    <th>Trạng thái</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="appointments-body">
                                <tr>
                                    <td colspan="6" class="text-muted">Đang tải dữ liệu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/xacthuc.js"></script>
    <script>
        (function() {
            var user = requireAuth(['admin']);
            if (user) document.getElementById('user-name').textContent = user.name || user.email;

            var body = document.getElementById('appointments-body');

            function statusSelect(current) {
                var statuses = ['CHO_XAC_NHAN', 'DA_XAC_NHAN', 'DA_HUY', 'DANG_KHAM', 'DA_KHAM', 'BO_LO'];
                return '<select data-status>' + statuses.map(function(s) {
                    return '<option value="' + s + '"' + (s === current ? ' selected' : '') + '>' + s + '</option>';
                }).join('') + '</select>';
            }

            function render(list) {
                if (!list || !list.length) {
                    body.innerHTML = '<tr><td colspan="6" class="text-muted">Chưa có lịch hẹn.</td></tr>';
                    return;
                }

                body.innerHTML = list.map(function(item) {
                    return '<tr data-id="' + item.id + '">'
                        + '<td>' + (item.benhNhan ? item.benhNhan.fullname : '-') + '</td>'
                        + '<td>' + (item.bacSi ? item.bacSi.hoTen : '-') + '</td>'
                        + '<td>' + (item.chuyenKhoa ? item.chuyenKhoa.ten : '-') + '</td>'
                        + '<td>' + (item.ngayKham || '-') + ' ' + (item.gioKham || '') + '</td>'
                        + '<td><span class="badge badge-info">' + (item.trangThai || '-') + '</span></td>'
                        + '<td>' + statusSelect(item.trangThai) + ' <button type="button" class="btn btn-sm btn-outline" data-save>Cập nhật</button></td>'
                        + '</tr>';
                }).join('');
            }

            function loadAppointments() {
                return apiJson('/api/admin/doctors').then(function(doctors) {
                    if (!doctors.length) return [];
                    var requests = doctors.map(function(d) {
                        return apiJson('/api/doctor/' + encodeURIComponent(d.id) + '/appointments').catch(function() { return []; });
                    });
                    return Promise.all(requests).then(function(results) {
                        var merged = [];
                        results.forEach(function(arr) {
                            merged = merged.concat(arr || []);
                        });
                        merged.sort(function(a, b) {
                            var aa = String(a.ngayKham || '') + 'T' + String(a.gioKham || '00:00');
                            var bb = String(b.ngayKham || '') + 'T' + String(b.gioKham || '00:00');
                            return aa.localeCompare(bb);
                        });
                        return merged;
                    });
                }).then(render).catch(function(err) {
                    body.innerHTML = '<tr><td colspan="6" class="text-danger">' + (err.message || 'Tải dữ liệu thất bại') + '</td></tr>';
                });
            }

            body.addEventListener('click', function(e) {
                var target = e.target;
                if (!target || !target.matches('[data-save]')) return;
                var row = target.closest('tr');
                var appointmentId = row.getAttribute('data-id');
                var status = row.querySelector('[data-status]').value;

                apiJson('/api/doctor/appointments/' + encodeURIComponent(appointmentId) + '/status', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: status })
                }).then(function(res) {
                    if (!res.success) throw new Error(res.message || 'Cập nhật thất bại');
                    return loadAppointments();
                }).catch(function(err) {
                    alert(err.message || 'Cập nhật thất bại');
                });
            });

            loadAppointments();
        })();
    </script>
</body>
</html>
