<!doctype html>
<html lang="vi">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Đăng ký - PHÒNG KHÁM PHENIKAAMEC</title>
        <link rel="stylesheet" href="/css/kieu.css" />
        <style>
            :root { --primary: #0d6efd; }
            html,body{height:100%;margin:0;font-family: Inter, Arial, Helvetica, sans-serif;background:#e3f2fd}
            .frame{width:calc(100% - 40px);max-width:1440px;height:calc(100vh - 40px);max-height:900px;margin:20px auto;background:#fff;border-radius:20px;box-shadow:0 20px 40px rgba(2,6,23,0.15);display:flex;overflow:hidden}
            .left{width:50%;padding:26px 42px 28px;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-start;gap:14px;overflow-y:auto}
            .logo{position:static;display:flex;gap:12px;align-items:center;z-index:2}
            .card-modern{width:100%;max-width:640px;border-radius:16px;box-shadow:0 10px 30px rgba(2,6,23,0.08);overflow:hidden;background:#fff}
            .card-header{padding:28px 34px 14px;background:transparent}
            .card-title{font-size:28px;margin:0 0 6px;color:#111;font-weight:700}
            .card-desc{margin:0;color:#6b7280}
            .card-body{padding:10px 34px 20px;background:#fff}
            label{display:block;font-size:13px;color:#495057;margin-bottom:6px}
            input[type="text"],input[type="email"],input[type="password"]{width:100%;height:48px;padding:10px 14px;border-radius:10px;border:1px solid #e6e9ef;font-size:15px}
            .btn-primary{display:inline-block;background:var(--primary);color:#fff;padding:12px 18px;border-radius:10px;border:0;font-weight:600;cursor:pointer}
            .link-btn{background:none;border:0;color:var(--primary);cursor:pointer;font-weight:600}
            .right{width:50%;position:relative;display:block}
            .hero-img{width:100%;height:100%;object-fit:cover}
            .overlay{position:absolute;inset:0;background:linear-gradient(135deg, rgba(13,110,253,0.78) 0%, rgba(13,110,253,0.55) 100%);display:flex;align-items:center;justify-content:center;color:#fff;padding:32px}
            .overlay h2{font-size:34px;margin:0 0 12px}
            .stats{display:flex;gap:24px;margin-top:16px}
            .stat{text-align:center}
            .stat .n{font-size:28px;font-weight:700}
            .small{font-size:14px;color:rgba(255,255,255,0.9)}

            .enter-left{opacity:0;transform:translateX(-40px);animation:enterLeft 2.2s ease-out forwards}
            .enter-card{opacity:0;transform:translateY(24px);animation:enterUp 2.4s ease-out 0.15s forwards}
            .enter-right{opacity:0;transform:translateX(48px);animation:enterRight 2.6s ease-out 0.2s forwards}

            @keyframes enterLeft { from {opacity:0;transform:translateX(-40px)} to {opacity:1;transform:translateX(0)} }
            @keyframes enterRight { from {opacity:0;transform:translateX(48px)} to {opacity:1;transform:translateX(0)} }
            @keyframes enterUp { from {opacity:0;transform:translateY(24px)} to {opacity:1;transform:translateY(0)} }

            @media (max-width:900px){.frame{flex-direction:column;height:auto;max-height:none}.left,.right{width:100%;height:auto}.left{padding:20px 16px 20px;overflow:visible}.right{min-height:320px}.overlay{padding:18px}}
        </style>
    </head>
    <body>
        <div class="frame">
            <div class="left enter-left">
                <div class="logo">
                    <img src="/images/logo.png" alt="PHÒNG KHÁM PHENIKAAMEC" style="height:36px;vertical-align:middle;margin-right:8px">
                    <div style="font-weight:700;font-size:20px;color:#111">PHÒNG KHÁM PHENIKAAMEC</div>
                </div>

                <div class="card-modern enter-card">
                    <div class="card-header">
                        <h3 class="card-title">Tạo tài khoản mới</h3>
                        <p class="card-desc">Đăng ký nhanh để bắt đầu đặt lịch khám trực tuyến.</p>
                    </div>
                    <div class="card-body">
                        <form id="register-form">
                            <div style="margin-bottom:12px">
                                <label for="fullname">Họ và tên</label>
                                <input id="fullname" type="text" placeholder="Nhập họ và tên" required />
                            </div>
                            <div style="margin-bottom:12px">
                                <label for="email">Email đăng nhập</label>
                                <input id="email" type="email" placeholder="Nhập email" required />
                            </div>
                            <div style="margin-bottom:12px">
                                <label for="password">Mật khẩu</label>
                                <input id="password" type="password" minlength="6" placeholder="Tối thiểu 6 ký tự" required />
                            </div>
                            <div style="margin-bottom:10px">
                                <label for="confirm">Xác nhận mật khẩu</label>
                                <input id="confirm" type="password" minlength="6" placeholder="Nhập lại mật khẩu" required />
                            </div>
                            <button type="submit" class="btn-primary" style="width:100%;height:48px">Đăng ký</button>
                            <div style="text-align:center;padding-top:12px;color:#6b7280">
                                Đã có tài khoản? <button type="button" id="login-btn" class="link-btn">Đăng nhập ngay</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="right enter-right">
                <img class="hero-img" src="https://images.unsplash.com/photo-1551076805-e1869033e561?q=80&w=1600&auto=format&fit=crop" alt="Healthcare" />
                <div class="overlay">
                    <div style="max-width:520px;text-align:center">
                        <h2>Đăng ký một lần, sử dụng lâu dài</h2>
                        <p class="small">Đặt lịch nhanh, theo dõi lịch khám và nhận nhắc lịch tự động mỗi ngày.</p>
                        <div class="stats" role="list" style="justify-content:center">
                            <div class="stat"><div class="n">24/7</div><div class="small">Đặt lịch</div></div>
                            <div class="stat"><div class="n">100%</div><div class="small">Bảo mật</div></div>
                            <div class="stat"><div class="n">Nhanh</div><div class="small">Tiện lợi</div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="/js/xacthuc.js"></script>
        <script>
            (function () {
                var user = getCurrentUser();
                if (user) {
                    redirectByRole(user.role);
                    return;
                }

                document.getElementById("register-form").addEventListener("submit", async function (e) {
                    e.preventDefault();

                    var fullname = document.getElementById("fullname").value.trim();
                    var email = document.getElementById("email").value.trim();
                    var password = document.getElementById("password").value;
                    var confirm = document.getElementById("confirm").value;
                    var role = "customer";

                    if (password !== confirm) {
                        alert("Mật khẩu xác nhận không khớp");
                        return;
                    }

                    try {
                        var reg = await authRegister(email, password, role);
                        if (!reg.success) {
                            alert(reg.message || "Đăng ký thất bại");
                            return;
                        }

                        var login = await authLogin(email, password);
                        if (!login.success) {
                            alert(login.message || "Đăng nhập thất bại");
                            return;
                        }

                        setCurrentUser({
                            name: fullname,
                            fullname: fullname,
                            email: email,
                            username: login.user,
                            role: "customer"
                        });

                        alert("Đăng ký thành công");
                        window.location.href = "/customer/trangchu.html";
                    } catch (err) {
                        alert(err.message || "Đăng ký thất bại");
                    }
                });

                document.getElementById("login-btn").addEventListener("click", function () {
                    window.location.href = "/admin/dangnhap.html";
                });
            })();
        </script>
    </body>
</html>
