<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bác sĩ - TT Care+</title>
    <link rel="stylesheet" href="/css/kieu.css">
</head>
<body class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header"><span class="logo"><img src="/images/logo1.jpg" alt="TT Care+" style="height:20px;vertical-align:middle;margin-right:6px">Admin</span></div>
        <nav class="sidebar-nav">
            <a href="/admin/trangquantri.html"><span class="icon">📊</span> Bảng điều khiển</a>
            <a href="/admin/khachhang.html"><span class="icon">👥</span> Quản lý khách hàng</a>
            <a href="/admin/taikhoan.html"><span class="icon">🔐</span> Quản lý tài khoản</a>
            <a href="/admin/bacsi.html" class="active"><span class="icon">🩺</span> Quản lý bác sĩ</a>
            <a href="/admin/khoa.html"><span class="icon">🏷️</span> Quản lý chuyên khoa</a>
            <a href="/admin/phongkham.html">Quản lý phòng khám</a>
            <a href="/admin/dichvu.html"><span class="icon">📋</span> Quản lý dịch vụ</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar">
            <h2>Quản lý bác sĩ</h2>
            <div class="user-menu">
                <span id="user-name"></span>
                <button type="button" class="btn" onclick="logout()">Đăng xuất</button>
            </div>
        </header>
        <div class="content">
            <h1 class="page-title">Tạo lịch làm việc bác sĩ</h1>

            <div class="card mb-1">
                <div class="card-header">Tạo lịch làm việc theo ca (chỉ bác sĩ có tài khoản)</div>
                <div class="card-body">
                    <form id="schedule-form" class="form-row">
                        <div class="form-group"><label>Bác sĩ</label><select id="s-doctor" required></select></div>
                        <div class="form-group"><label>Ngày</label><input type="date" id="s-date" required /></div>
                        <div class="form-group">
                            <label>Ca làm việc</label>
                            <select id="s-shift" required>
                                <option value="MORNING">Ca sáng (08:00 - 12:00)</option>
                                <option value="AFTERNOON">Ca chiều (13:00 - 17:00)</option>
                                <option value="EVENING">Ca tối (18:00 - 21:00)</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Phí khám</label><input type="number" id="s-fee" min="0" step="1000" /></div>
                        <div class="form-group" style="align-self:end;"><button type="submit" class="btn btn-outline">Tạo lịch</button></div>
                    </form>
                    <p id="doctor-note" class="text-muted" style="margin-top:10px;margin-bottom:0;"></p>
                </div>
            </div>
        </div>
    </main>
    <script src="/js/xacthuc.js"></script>
    <script>
        (function() {
            var user = requireAuth(['admin']);
            if (user) document.getElementById('user-name').textContent = user.name || user.email;

            var doctorSelect = document.getElementById('s-doctor');
            var doctorNote = document.getElementById('doctor-note');
            var scheduleForm = document.getElementById('schedule-form');
            var scheduleSubmit = scheduleForm.querySelector('button[type="submit"]');

            function fillSelect(el, list, textFn) {
                el.innerHTML = '';
                list.forEach(function(item) {
                    var opt = document.createElement('option');
                    opt.value = item.id;
                    opt.textContent = textFn(item);
                    el.appendChild(opt);
                });
            }

            function loadAll() {
                return apiJson('/api/admin/doctors/orphaned', { method: 'DELETE' })
                    .catch(function() {
                        // Khong chan trang neu khong cleanup duoc.
                    })
                    .then(function() {
                        return apiJson('/api/admin/doctors');
                    })
                    .then(function(doctors) {
                        doctors = doctors || [];
                        fillSelect(doctorSelect, doctors, function(d) { return (d.hoTen || 'Bac si') + ' - ' + (d.email || '-'); });

                        if (!doctors.length) {
                            doctorSelect.innerHTML = '<option value="">Chưa có bác sĩ có tài khoản</option>';
                            doctorSelect.disabled = true;
                            scheduleSubmit.disabled = true;
                            doctorNote.textContent = 'Không có bác sĩ hợp lệ để tạo lịch. Vui lòng tạo tài khoản vai trò doctor trước ở trang Quản lý tài khoản.';
                            return;
                        }

                        doctorSelect.disabled = false;
                        scheduleSubmit.disabled = false;
                        doctorNote.textContent = 'Danh sách bác sĩ được đồng bộ từ tài khoản role doctor.';
                    })
                    .catch(function(err) {
                        doctorSelect.innerHTML = '<option value="">Tải dữ liệu thất bại</option>';
                        doctorSelect.disabled = true;
                        scheduleSubmit.disabled = true;
                        doctorNote.textContent = err.message || 'Tải dữ liệu bác sĩ thất bại';
                    });
            }

            document.getElementById('schedule-form').addEventListener('submit', function(e) {
                e.preventDefault();
                var params = new URLSearchParams({
                    doctorId: doctorSelect.value,
                    date: document.getElementById('s-date').value,
                    shift: document.getElementById('s-shift').value,
                });
                var fee = document.getElementById('s-fee').value;
                if (fee) params.set('fee', fee);

                apiJson('/api/admin/work-schedules?' + params.toString(), {
                    method: 'POST'
                }).then(function(res) {
                    if (!res.success) throw new Error(res.message || 'Tạo lịch thất bại');
                    alert('Đã tạo lịch làm việc theo ca');
                    document.getElementById('schedule-form').reset();
                }).catch(function(err) {
                    alert(err.message || 'Tạo lịch thất bại');
                });
            });

            loadAll();
        })();
    </script>
</body>
</html>
