<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý chuyên khoa - TT Care+</title>
    <link rel="stylesheet" href="/css/kieu.css">
</head>
<body class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header"><span class="logo">Admin</span></div>
        <nav class="sidebar-nav">
            <a href="/admin/trangquantri.html"><span class="icon">📊</span> Bảng điều khiển</a>
            <a href="/admin/khachhang.html"><span class="icon">👥</span> Quản lý khách hàng</a>
            <a href="/admin/taikhoan.html"><span class="icon">🔐</span> Quản lý tài khoản</a>
            <a href="/admin/bacsi.html"><span class="icon">🩺</span> Quản lý bác sĩ</a>
            <a href="/admin/khoa.html" class="active"><span class="icon">🏷️</span> Quản lý chuyên khoa</a>
            <a href="/admin/phongkham.html">Quản lý phòng khám</a>
            <a href="/admin/dichvu.html"><span class="icon">📋</span> Quản lý dịch vụ</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar">
            <h2>Quản lý chuyên khoa</h2>
            <div class="user-menu">
                <span id="user-name"></span>
                <button type="button" class="btn" onclick="logout()">Đăng xuất</button>
            </div>
        </header>
        <div class="content">
            <h1 class="page-title">Chuyên khoa</h1>
            <div class="card mb-1">
                <div class="card-body">
                    <form id="specialty-form" class="form-row">
                        <div class="form-group">
                            <label>Tên chuyên khoa</label>
                            <input type="text" id="sp-ten" required />
                        </div>
                        <div class="form-group">
                            <label>Phí mặc định</label>
                            <input type="number" id="sp-fee" min="0" step="1000" />
                        </div>
                        <div class="form-group" style="align-self:end;">
                            <button type="submit" class="btn btn-primary" id="sp-submit-btn">Thêm chuyên khoa</button>
                            <button type="button" class="btn" id="sp-cancel-btn" style="display:none;">Hủy</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-body">
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên</th>
                                    <th>Phí mặc định</th>
                                    <th style="width: 150px; text-align: center;">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="specialty-body">
                                <tr><td colspan="4" class="text-muted">Đang tải...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="/js/xacthuc.js"></script>
    <script>
        (function() {
            var user = requireAuth(['admin']);
            if (user) document.getElementById('user-name').textContent = user.name || user.email;

            var body = document.getElementById('specialty-body');
            var form = document.getElementById('specialty-form');
            var tenInput = document.getElementById('sp-ten');
            var feeInput = document.getElementById('sp-fee');
            var submitBtn = document.getElementById('sp-submit-btn');
            var cancelBtn = document.getElementById('sp-cancel-btn');
            var editingId = null;

            function render(list) {
                if (!list || !list.length) {
                    body.innerHTML = '<tr><td colspan="4" class="text-muted">Chưa có dữ liệu.</td></tr>';
                    return;
                }
                body.innerHTML = list.map(function(item) {
                    return '<tr><td>' + item.id + '</td><td>' + (item.ten || '-') + '</td><td>' + (item.phiKhamMacDinh || 0) + '</td><td style="text-align: center;"><button type="button" class="btn btn-small btn-warning" onclick="editSpecialty(' + item.id + ', \'' + (item.ten || '').replace(/'/g, "\\'") + '\', ' + (item.phiKhamMacDinh || 0) + ')">Sửa</button> <button type="button" class="btn btn-small btn-danger" onclick="deleteSpecialty(' + item.id + ')">Xóa</button></td></tr>';
                }).join('');
            }

            function load() {
                return apiJson('/api/admin/specialties').then(render).catch(function(err) {
                    body.innerHTML = '<tr><td colspan="4" class="text-danger">' + (err.message || 'Tải thất bại') + '</td></tr>';
                });
            }

            window.editSpecialty = function(id, ten, fee) {
                editingId = id;
                tenInput.value = ten;
                feeInput.value = fee;
                submitBtn.textContent = 'Cập nhật';
                cancelBtn.style.display = 'inline-block';
                tenInput.focus();
            };

            window.deleteSpecialty = function(id) {
                if (!confirm('Bạn chắc chắn muốn xóa chuyên khoa này?')) return;
                apiJson('/api/admin/specialties/' + id, { method: 'DELETE' })
                    .then(function() {
                        return load();
                    })
                    .catch(function(err) {
                        alert(err.message || 'Xóa chuyên khoa thất bại');
                    });
            };

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                var ten = tenInput.value.trim();
                var fee = feeInput.value;
                var isUpdate = editingId !== null;
                var url = isUpdate ? '/api/admin/specialties/' + editingId : '/api/admin/specialties';
                var method = isUpdate ? 'PUT' : 'POST';

                apiJson(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ten: ten, phiKhamMacDinh: fee ? Number(fee) : 0 })
                }).then(function() {
                    form.reset();
                    editingId = null;
                    submitBtn.textContent = 'Thêm chuyên khoa';
                    cancelBtn.style.display = 'none';
                    return load();
                }).catch(function(err) {
                    alert(err.message || (isUpdate ? 'Cập nhật thất bại' : 'Thêm chuyên khoa thất bại'));
                });
            });

            cancelBtn.addEventListener('click', function(e) {
                e.preventDefault();
                form.reset();
                editingId = null;
                submitBtn.textContent = 'Thêm chuyên khoa';
                cancelBtn.style.display = 'none';
            });

            load();
        })();
    </script>
</body>
</html>
