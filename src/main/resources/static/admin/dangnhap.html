<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống</title>
    <link rel="stylesheet" href="/css/kieu.css">
</head>
<body class="auth-page">
    <header class="public-header public-header-mini">
        <a href="/customer/trangchu.html" class="brand">Bệnh viện Đa khoa</a>
        <nav class="header-nav">
            <a href="/customer/trangchu.html" class="btn btn-outline">Trang chủ</a>
        </nav>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-main" style="width: 100%;">
                <h2>Đăng nhập</h2>
                <form id="form-login" class="auth-form">
                    <div class="form-group">
                        <label>Email / Số điện thoại</label>
                        <input type="text" id="login-email" placeholder="Email hoặc số điện thoại" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
                </form>
                <p class="auth-hint">Chưa có tài khoản? <a href="/admin/dangky.html">Đăng ký</a></p>
            </div>
        </div>
    </div>

    <script src="/js/xacthuc.js"></script>
    <script>
        (function () {
            var user = getCurrentUser();
            if (user) {
                redirectByRole(user.role);
                return;
            }

            document.getElementById("form-login").addEventListener("submit", async function (e) {
                e.preventDefault();
                var email = document.getElementById("login-email").value.trim();
                var password = document.getElementById("login-password").value;

                try {
                    var res = await authLogin(email, password);
                    if (!res.success) {
                        alert(res.message || "Đăng nhập thất bại");
                        return;
                    }

                    var role = normalizeRole(res.role);
                    var userObj = {
                        name: email.indexOf("@") > 0 ? email.split("@")[0] : email,
                        email: email,
                        username: res.user,
                        role: role
                    };

                    setCurrentUser(userObj);
                    redirectByRole(role);
                } catch (err) {
                    alert(err.message || "Đăng nhập thất bại");
                }
            });
        })();
    </script>
</body>
</html>
