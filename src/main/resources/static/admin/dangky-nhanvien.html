<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký nhân viên</title>
    <link rel="stylesheet" href="/css/kieu.css">
</head>
<body class="auth-page">
    <header class="public-header public-header-mini">
        <a href="/customer/trangchu.html" class="brand">Bệnh viện Đa khoa</a>
        <nav class="header-nav">
            <a href="/dangnhap.html" class="btn btn-outline">Đăng nhập</a>
            <a href="/admin/dangki.html" class="btn btn-outline">Đăng ký chung</a>
        </nav>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-main" style="width: 100%;">
                <h2>Đăng ký nhân viên (Admin/Doctor)</h2>
                <form id="register-staff-form" class="auth-form">
                    <div class="form-group">
                        <label for="role">Vai trò</label>
                        <select id="role" required>
                            <option value="admin">Admin</option>
                            <option value="doctor">Doctor</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm">Xác nhận mật khẩu</label>
                        <input type="password" id="confirm" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Tạo tài khoản</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/xacthuc.js"></script>
    <script>
        (function () {
            document.getElementById("register-staff-form").addEventListener("submit", async function (e) {
                e.preventDefault();
                var role = document.getElementById("role").value;
                var email = document.getElementById("email").value.trim();
                var password = document.getElementById("password").value;
                var confirm = document.getElementById("confirm").value;

                if (password !== confirm) {
                    alert("Mật khẩu xác nhận không khớp");
                    return;
                }

                try {
                    var reg = await authRegister(email, password, role);
                    if (!reg.success) {
                        alert(reg.message || "Đăng ký thất bại");
                        return;
                    }
                    alert("Đăng ký thành công");
                    window.location.href = "/dangnhap.html";
                } catch (err) {
                    alert(err.message || "Đăng ký thất bại");
                }
            });
        })();
    </script>
</body>
</html>
