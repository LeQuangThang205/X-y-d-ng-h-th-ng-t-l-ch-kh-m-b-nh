<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="/css/kieu.css">
</head>
<body class="auth-page">
    <header class="public-header public-header-mini">
        <a href="/customer/trangchu.html" class="brand">Bệnh viện Đa khoa</a>
        <nav class="header-nav">
            <a href="/dangnhap.html" class="btn btn-outline">Đăng nhập</a>
        </nav>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-main" style="width: 100%;">
                <h2>Đăng ký tài khoản</h2>
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="role">Vai trò</label>
                        <select id="role" required>
                            <option value="customer" selected>Customer</option>
                            <option value="doctor">Doctor</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="fullname">Họ và tên</label>
                        <input type="text" id="fullname" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email đăng nhập</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm">Xác nhận mật khẩu</label>
                        <input type="password" id="confirm" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Đăng ký</button>
                </form>
                <p class="auth-hint">Đã có tài khoản? <a href="/dangnhap.html">Đăng nhập</a></p>
            </div>
        </div>
    </div>

    <script src="/js/xacthuc.js"></script>
    <script>
        (function () {
            var user = getCurrentUser();
            if (user) {
                redirectByRole(user.role);
                return;
            }

            document.getElementById("register-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                var role = document.getElementById("role").value;
                var fullname = document.getElementById("fullname").value.trim();
                var email = document.getElementById("email").value.trim();
                var password = document.getElementById("password").value;
                var confirm = document.getElementById("confirm").value;

                if (password !== confirm) {
                    alert("Mật khẩu xác nhận không khớp");
                    return;
                }

                try {
                    var reg = await authRegister(email, password, role);
                    if (!reg.success) {
                        alert(reg.message || "Đăng ký thất bại");
                        return;
                    }

                    var login = await authLogin(email, password);
                    if (!login.success) {
                        alert(login.message || "Đăng nhập thất bại");
                        return;
                    }

                    setCurrentUser({
                        name: fullname,
                        email: email,
                        username: login.user,
                        role: login.role
                    });

                    alert("Đăng ký thành công");
                    redirectByRole(login.role);
                } catch (err) {
                    alert(err.message || "Đăng ký thất bại");
                }
            });
        })();
    </script>
</body>
</html>
